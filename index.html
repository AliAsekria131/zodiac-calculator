<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نجمك — اكتشف برجك</title>

  <!-- SEO -->
  <meta name="description" content="احسب برجك من اسمك واسم أمك — أداة مجانية وسريعة" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (مشاركة على واتساب وتويتر) -->
  <meta property="og:title"       content="نجمك — اكتشف برجك" />
  <meta property="og:description" content="احسب برجك من اسمك واسم أمك" />
  <meta property="og:type"        content="website" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Favicon -->
  <!-- إذا صار WebP -->
  <link rel="icon" href="favicon.webp" type="image/webp" />

</head>
<body>

  <div class="container" style="max-width:480px;">

    <!-- Header -->
    <div class="app-header">
      <div class="stars">✦ ✦ ✦</div>
      <h1>نجمك</h1>
      <p>أدخل اسم الابن واسم أمه لمعرفة برجه</p>
    </div>

    <!-- Form card -->
    <div class="glass-card mb-4">
      <div class="mb-3">
        <label class="form-label">اسم الابن (بالعربية)</label>
        <input type="text" id="input-son" class="form-control" placeholder="مثال: علي" autocomplete="off" />
        <div class="error-msg" id="err-son">يرجى إدخال اسم عربي صحيح</div>
      </div>

      <div class="mb-4">
        <label class="form-label">اسم الأم (بالعربية)</label>
        <input type="text" id="input-mother" class="form-control" placeholder="مثال: فاطمة" autocomplete="off" />
        <div class="error-msg" id="err-mother">يرجى إدخال اسم عربي صحيح</div>
      </div>

      <button class="btn-calculate" onclick="handleCalculate()">✨ احسب البرج</button>
    </div>

    <!-- Result card -->
    <div class="glass-card text-center" id="result-section">
      <div class="zodiac-icon" id="result-icon"></div>
      <div class="zodiac-name"  id="result-name"></div>
      <div class="zodiac-subtitle" id="result-subtitle"></div>

      <hr class="divider" />

      <div class="mb-3">
        <div class="info-row">
          <span class="info-label">اسم الابن</span>
          <span class="info-value" id="disp-son"></span>
        </div>
        <div class="info-row">
          <span class="info-label">قيمة اسم الابن</span>
          <span class="info-value" id="disp-son-val"></span>
        </div>
        <div class="info-row">
          <span class="info-label">اسم الأم</span>
          <span class="info-value" id="disp-mother"></span>
        </div>
        <div class="info-row">
          <span class="info-label">قيمة اسم الأم</span>
          <span class="info-value" id="disp-mother-val"></span>
        </div>
        <div class="info-row">
          <span class="info-label">المجموع الكلي</span>
          <span class="info-value" id="disp-total"></span>
        </div>
        <div class="info-row">
          <span class="info-label">رقم البرج</span>
          <span class="info-value" id="disp-zodiac-num"></span>
        </div>
      </div>

      <button class="btn-reset" onclick="handleReset()">↩ إعادة الحساب</button>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Scripts — الترتيب مهم -->
  <script src="js/data.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
